[package]
name = "mdviewer-core"
version = "0.1.0"
edition = "2021"
description = "Shared MDViewer core: anchor + comments + sidecar + render."
license = "GPL-3.0-or-later"

[lib]
name = "mdviewer_core"
path = "src/lib.rs"

[dependencies]
# A3 + A6 deps merged. Render half (pulldown-cmark, syntect) plus
# anchor/comments graph (diff-match-patch-rs, automerge, anyhow,
# thiserror, base64, similar). Versions match what previously lived
# in src-tauri/Cargo.toml so transitive crate-graph behaviour is
# unchanged. ts-rs derive must stay attached to the canonical
# RenderOptions / RenderResult / Anchor / Thread / Comment definitions
# (the generated TypeScript binding pulls from the same source).
pulldown-cmark = "0.11"
syntect = "5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
diff-match-patch-rs = "0.4"
automerge = "0.5"
base64 = "0.22"
similar = "2.5"
ts-rs = "8"
