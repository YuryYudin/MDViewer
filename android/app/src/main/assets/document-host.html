<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=4" />
    <link rel="stylesheet" href="document.css" />
    <style>
        body { margin: 0; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body[data-theme="dark"] { background: #0f0f10; color: #e4e4e7; }
        body[data-theme="light"] { background: #ffffff; color: #1f2937; }
    </style>
    <!-- D2: selection-bridge.js wires the browser's selectionchange and
         click events to the MdvSelection JavaScriptInterface. The script
         no-ops if the interface is absent, so the template stays valid for
         scenarios where MarkdownWebView is mounted without a SelectionBridge
         (e.g. host-JVM smoke tests under Robolectric). `defer` keeps the
         attach-time listeners off the parser-blocking path. -->
    <script src="selection-bridge.js" defer></script>
    <!-- D3: highlight-injector.js exposes window.applyAnchors(rangesJson)
         which the JVM-side HighlightInjector calls via evaluateJavascript
         to wrap [data-src-offset] carriers in <span class="anchored">.
         The script self-installs once via __mdvHighlightInjectorInstalled
         so a recomposition's reload doesn't redefine applyAnchors mid-
         session. `defer` keeps it off the parser-blocking path. -->
    <script src="highlight-injector.js" defer></script>
</head>
<body data-theme="__THEME__">
__BODY__
</body>
</html>
