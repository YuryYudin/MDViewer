[package]
name = "mdviewer"
version = "0.1.0"
edition = "2021"
description = "Cross-platform markdown viewer with collaborative comments"
authors = ["MDViewer team"]
license = "MIT OR Apache-2.0"
repository = ""
default-run = "mdviewer"

[lib]
name = "mdviewer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "mdviewer"
path = "src/main.rs"

[[bin]]
name = "export_types"
path = "src/bin/export_types.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
pulldown-cmark = "0.11"
syntect = "5"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ts-rs = "8"
toml = "0.8"
diff-match-patch-rs = "0.4"
notify = "6"
automerge = "0.5"
base64 = "0.22"
similar = "2.5"
walkdir = "2"

# E2E testing on macOS. Optional dep gated behind the `e2e` feature so
# release bundles built without the feature never expose a WebDriver port.
# The debug-build e2e workflow is `cargo build --features e2e`.
tauri-plugin-webdriver-automation = { version = "0.1", optional = true }

[features]
default = []
e2e = ["dep:tauri-plugin-webdriver-automation"]

[dev-dependencies]
tempfile = "3"
pretty_assertions = "1"
criterion = "0.5"

[[bench]]
name = "anchor_bench"
harness = false
