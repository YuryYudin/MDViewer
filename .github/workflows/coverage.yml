name: coverage
on: [push, pull_request]
jobs:
  rust-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: llvm-tools-preview }
      # `cargo llvm-cov --workspace` builds the full dep graph including
      # src-tauri, which transitively requires glib/gtk/webkit on Linux.
      # Without these system libs, glib-sys's pkg-config probe fails with
      # "Package glib-2.0 was not found in the pkg-config search path"
      # and the whole workspace coverage run aborts. Same package list as
      # ci.yml's gen-types and test-rust jobs — keeping them in sync.
      - name: Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            build-essential \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev
      - run: cargo install cargo-llvm-cov --locked
      # `--ignore-filename-regex 'bin/'` keeps the render-cli binary
      # (crates/mdviewer-core/src/bin/render_cli.rs) out of the workspace
      # line-coverage denominator. The bin has no unit tests by design —
      # it's exercised end-to-end by tests/render/oracle.test.ts (B3).
      # The regex is intentionally broad so future tooling bins under
      # crates/*/src/bin/ get the same exemption.
      - run: cargo llvm-cov --workspace --ignore-filename-regex 'bin/' --lcov --output-path coverage.lcov
      - name: Self-test the coverage gate script
        run: tests/scripts/check_coverage_test.sh
      - name: Gate mdviewer-core at 80% line coverage
        run: scripts/check-coverage.sh coverage.lcov 80 crates/mdviewer-core/
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: coverage-lcov, path: coverage.lcov }
