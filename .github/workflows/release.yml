name: Release

# Triggered on `v*` tag push so a typo'd commit on `main` cannot publish.
# `workflow_dispatch` lets a release manager fire the pipeline manually for
# a pre-release smoke check (the resulting Release stays in draft state).
#
# All `${{ ... }}` interpolations pull from the matrix block (config values
# committed here) or `github.ref_name` (the tag name). They flow into
# action inputs (`with:`), not shell-interpolated `run:` commands, so
# command-injection vectors via tag names don't apply.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# tauri-action needs `contents: write` to create a Release and attach
# bundle artifacts. No other scopes required.
permissions:
  contents: write

jobs:
  bundle:
    name: Bundle (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon only (Intel macs deferred per the design discussion;
          # revisit if user reports indicate Intel is a meaningful share).
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
            label: macOS (Apple Silicon)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
            label: Windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage,rpm
            label: Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # webkit2gtk-4.1 is the Tauri 2 line; rpm-build (`rpm` package) is
      # needed for the rpm bundle target. Linux-only.
      - name: Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            build-essential \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            rpm

      - run: npm ci

      # A12: build the mdviewer-askpass helper bin BEFORE tauri build runs
      # so the `bundle.externalBin` declaration in tauri.conf.json can
      # resolve `binaries/mdviewer-askpass-<triple>` at bundle time. The
      # outer build.rs handles this in CI/dev runs, but the release path
      # invokes tauri-action which forces --release; we mirror that
      # explicitly here to guarantee a real signed binary lands in
      # `src-tauri/binaries/` rather than the empty placeholder build.rs
      # writes on a fresh checkout.
      #
      # Windows uses the russh in-process auth callback (no helper bin
      # ever invoked), so the step is skipped there — the placeholder
      # written by build.rs is sufficient for the MSI bundler.
      - name: Build mdviewer-askpass helper (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: src-tauri
        shell: bash
        run: |
          cargo build --release --bin mdviewer-askpass --locked --target ${{ matrix.target }}
          mkdir -p binaries
          cp target/${{ matrix.target }}/release/mdviewer-askpass \
             binaries/mdviewer-askpass-${{ matrix.target }}

      # tauri-action runs `tauri build`, picks up bundle.targets from
      # tauri.conf.json (overridden via --bundles), and uploads each
      # produced artifact to a draft GitHub Release named after the tag.
      # Code-signing secrets intentionally NOT wired (unsigned bundles
      # work, but trigger Gatekeeper / SmartScreen warnings on first
      # launch). Add APPLE_CERTIFICATE / APPLE_ID + signing flags here
      # when notarization is in scope.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MDViewer ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  # Android sideload APK. Runs in parallel with the desktop bundle matrix so
  # cold tag pushes finish in roughly one bundle's wall-clock time. The
  # signed APK lands as an asset on the SAME draft Release `tauri-action`
  # creates from the bundle matrix; both job sets must finish green before
  # a human flips the draft to Published.
  #
  # Why a separate job (vs. reusing `.github/workflows/android.yml`'s
  # `release-apk`): release.yml is the single source of truth for what
  # ships on a tag. android.yml's `release-apk` job is the per-PR /
  # per-commit signing rehearsal; duplicating the assemble step here keeps
  # the release-cut path visible in one file. The NDK + cargo-ndk + signing
  # env-var contract matches android.yml exactly — drift will be caught by
  # E4's `cleanupReleaseKeystore` finalizer and the leaked-keystore guard.
  android:
    name: Bundle (Android)
    runs-on: ubuntu-latest
    # Pin to the firebase-distribution environment so the Upload-to-Firebase
    # step below can read FIREBASE_ANDROID_APP_ID / FIREBASE_SERVICE_ACCOUNT
    # / FIREBASE_TESTER_GROUP. The environment's branch policy restricts
    # deployment to `main`, which matches tag pushes (tags from main).
    environment: firebase-distribution
    steps:
      - uses: actions/checkout@v6
        with:
          # versionName resolves via `git describe --tags --abbrev=0` in
          # `app/build.gradle.kts`. Default depth=1 has no tags, so the
          # resulting APK would be labelled `0.0.0-dev`. Mirrors the
          # checkout in android.yml's release-apk job.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - uses: android-actions/setup-android@v3

      - name: Install AGP-compatible NDK + cmake
        run: |
          # Mirrors android.yml's install step: gradle's NDK selection
          # in android/core/build.gradle.kts globs $ANDROID_HOME/ndk/
          # and picks the highest AGP-supported version installed,
          # falling back to a hard pin when nothing compatible is
          # there. The runner image's preinstalled NDK is too-new
          # preview, so we install the fallback version explicitly to
          # ensure gradle finds it. Bump in lockstep with the gradle
          # fallback when bumping AGP.
          NDK_VERSION="27.2.12479018"
          sdkmanager --install "ndk;$NDK_VERSION" "cmake;3.22.1" >/dev/null
          ndk_dir="$ANDROID_HOME/ndk/$NDK_VERSION"
          if [ ! -d "$ndk_dir" ]; then
            echo "::error::NDK install failed: $ndk_dir not present after sdkmanager"
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ndk_dir" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_dir" >> "$GITHUB_ENV"
          echo "Resolved NDK: $ndk_dir"

      - name: Assemble release APK
        working-directory: android
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: ./gradlew :app:assembleRelease --stacktrace

      # Mirror the leaked-keystore guard from android.yml. The
      # cleanupReleaseKeystore finalizer in app/build.gradle.kts runs on
      # both success and failure, but a defense-in-depth check here means
      # the release-cut path can't ship an APK alongside a tmp keystore.
      - name: Verify tmp keystore was cleaned up
        working-directory: android
        run: |
          if [ -f app/build/release-keystore.jks ]; then
            echo "::error::Release keystore tmp file leaked into workspace"
            exit 1
          fi

      # Rename so the asset on the Release matches the desktop bundle
      # naming (`MDViewer_<ver>_*`). Using the raw tag (`v0.2.0`) keeps the
      # filename traceable to a specific Release page. The final asset
      # filename is `mdviewer-android-<tag>.apk` (e.g.
      # `mdviewer-android.apk`-style — see RELEASING.md "Android sideload").
      - name: Rename APK to release asset name
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             "android/app/build/outputs/apk/release/mdviewer-android-${{ github.ref_name }}.apk"

      # Append the APK to the SAME draft Release `tauri-action` creates
      # from the bundle matrix. `softprops/action-gh-release@v2` is
      # idempotent — if the bundle matrix wins the race and creates the
      # draft first, this call attaches; if this job wins, it creates the
      # draft and tauri-action attaches the desktop bundles to it.
      # `draft: true` keeps the human Publish gate intact.
      - name: Upload signed APK to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'MDViewer ${{ github.ref_name }}'
          draft: true
          prerelease: false
          files: android/app/build/outputs/apk/release/mdviewer-android-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push the same signed APK to Firebase App Distribution so testers
      # get an in-app update prompt without waiting for the human to flip
      # the GitHub draft to Published. The environment-scoped secrets
      # (firebase-distribution) provide:
      #   - FIREBASE_ANDROID_APP_ID — the App Distribution app identifier
      #     (1:<project_number>:android:<hash>)
      #   - FIREBASE_SERVICE_ACCOUNT — JSON service-account key with the
      #     `firebase.distributions.publish` role on this app
      #   - FIREBASE_TESTER_GROUP — the named tester group to distribute to
      # Release notes are pulled from the tag's annotated message via
      # `git for-each-ref` so testers see the same changelog GitHub shows.
      - name: Extract tag release notes for Firebase
        id: tag_notes
        run: |
          notes="$(git for-each-ref refs/tags/${{ github.ref_name }} --format='%(contents)' 2>/dev/null | head -c 1000)"
          if [ -z "$notes" ]; then
            notes="MDViewer ${{ github.ref_name }} — see https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }} for the full changelog."
          fi
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload signed APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ secrets.FIREBASE_TESTER_GROUP }}
          file: android/app/build/outputs/apk/release/mdviewer-android-${{ github.ref_name }}.apk
          releaseNotes: ${{ steps.tag_notes.outputs.notes }}

  # Sentinel "the draft is complete" gate. `needs: [bundle, android]` means
  # this job only runs (and the workflow's overall status only goes green)
  # when EVERY desktop matrix leg AND the Android job have succeeded.
  # GitHub's commit-status / branch-protection UI surfaces this single
  # check, so a release manager sees one yes/no signal before clicking
  # **Publish release** in the GitHub UI. The job intentionally does no
  # publish action — it only summarises that the draft is ready.
  release-ready:
    name: Release draft ready (desktop + Android)
    runs-on: ubuntu-latest
    needs: [bundle, android]
    steps:
      - name: Confirm both bundle matrix and Android job succeeded
        run: |
          echo "Desktop bundles + Android APK all built and uploaded."
          echo "Draft Release ${{ github.ref_name }} is ready for human review."
          echo "Smoke-test per RELEASING.md, then click Publish in the GitHub UI."

  # Follow-up TODOs intentionally left here so reviewers see them in PRs:
  # - macOS notarization: APPLE_CERTIFICATE / APPLE_ID secrets + tauri-action's
  #   built-in signing flow. Deferred per the design — unsigned DMG works
  #   (right-click → Open on first launch).
  # - Windows EV cert: SignTool integration with a Comodo or Sectigo cert.
  #   Deferred per the same call. SmartScreen will warn on first run.
  # - Intel macOS: revisit if Intel users surface in real reports.
  # - Play Store upload: complement the GitHub Release sideload APK with an
  #   internal-track AAB upload via `r0adkll/upload-google-play`. Requires a
  #   Google Play service account JSON in CI secrets.
