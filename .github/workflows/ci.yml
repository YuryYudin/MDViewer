name: CI

# Runs on every PR and on pushes to main. The fast jobs (gen-types, test-js)
# gate the matrix builds so a codegen drift or unit-test failure short-
# circuits the ~30 min of cross-OS bundle compilation.
#
# All ${{ ... }} interpolations in this file pull from `github.workflow`,
# `github.ref`, or `matrix.*` — workflow / ref names that the GitHub
# scheduler controls, and matrix values committed to this file. None of
# them ride untrusted user input (issue titles, PR bodies, head_ref).

on:
  pull_request:
  push:
    branches: [main]

# Force-pushes to a PR cancel the in-flight run. Pushes to main never cancel
# each other so every merge gets a fresh full run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  # -- Gating: codegen drift + JS unit tests run first; ~2 min combined.
  # If either fails, the matrix builds below are skipped entirely.
  gen-types:
    name: Codegen drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      # `cargo run --bin export_types` compiles the full mdviewer_lib dep
      # graph (tauri pulls in glib/gtk on Linux), so the build deps are
      # required even though the bin itself is just a serializer.
      - name: Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            build-essential \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev
      - run: npm ci
      - name: Re-run gen:types and assert no drift
        run: |
          npm run gen:types
          if ! git diff --quiet src/types-generated.ts; then
            echo "::error::src/types-generated.ts is stale. Run 'npm run gen:types' locally and commit the result."
            git --no-pager diff src/types-generated.ts
            exit 1
          fi

  test-js:
    name: JS unit tests
    runs-on: ubuntu-latest
    needs: gen-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      # tests/codegen.test.ts invokes `cargo run --bin export_types` to
      # confirm bit-exact codegen, so the same Linux build deps are
      # required as in gen-types above.
      - name: Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            build-essential \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev
      - run: npm ci
      - run: npm test

  # -- Cross-platform Rust unit/integration tests
  test-rust:
    name: Rust tests (${{ matrix.os }})
    needs: gen-types
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            build-essential \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev
      # A12: ssh_integration_phase1.rs spawns /usr/sbin/sshd against the
      # committed fixture keypair. The Linux runner image ships ssh client
      # tools but NOT the server; install openssh-server here so the
      # integration test has something to connect to. macOS uses the
      # bundled /usr/sbin/sshd and needs no install; the Windows test
      # path uses the in-process russh harness (no system dep).
      - name: Install openssh-server (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y openssh-server
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --features e2e --no-fail-fast

  # -- Build verification: confirm the binary compiles on each OS. Doesn't
  # bundle (that's the release workflow's job); this just catches platform-
  # specific compile breakage on PRs.
  build-check:
    name: Build check (${{ matrix.os }})
    needs: [test-js, test-rust]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            build-essential \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev
      - run: npm ci
      - name: Vite build
        run: npm run build
      - name: Tauri compile (no bundle)
        working-directory: src-tauri
        run: cargo build --release --bin mdviewer

  # -- E2E (macOS only — tauri-webdriver-automation is mac-only)
  e2e:
    name: E2E (macOS)
    needs: [test-js, test-rust]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      # tauri-wd is the WebDriver server wdio.conf.ts expects on
      # 127.0.0.1:4444. Locally it's installed at ~/.cargo/bin/tauri-wd
      # via `cargo install`. CI runners don't have it, so install it here.
      # Pinned to the same version we run locally (0.1.3) so a plugin
      # release can't silently break the spec suite.
      - name: Install tauri-wd
        run: cargo install tauri-webdriver-automation --version 0.1.3 --locked
      - run: npm ci
      - name: Run e2e
        run: npm run test:e2e
