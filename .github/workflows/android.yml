name: android

# Linux-only Android pipeline. Two jobs:
#   * build    — compiles the Rust workspace, runs Gradle assemble + unit
#                tests, uploads the JaCoCo HTML and debug APK.
#   * emulator — runs `:app:connectedDebugAndroidTest` on an API 33 emulator
#                via reactivecircus/android-emulator-runner with KVM.
#                continue-on-error until E7 because the e2e specs from A1
#                are deliberately RED until the screens land in C–E.
#
# Why Linux + KVM: macOS runners are ~10x more expensive and the emulator
# runner action supports nested virtualization on ubuntu-latest since v2.
# Why a scoped `cargo build` before Gradle: catches Rust-side regressions
# (UniFFI scaffolding, version-catalog drift) on the same job that builds
# the Android artifacts. We deliberately exclude the desktop `mdviewer`
# (Tauri) crate from the Android job's cargo step because it depends on
# GTK/WebKit2 system libs that aren't installed on this runner — that
# crate is the desktop CI's responsibility, and the Android job has no
# need for its build artifacts.

on:
  push:
  pull_request:
  # Allow manual dispatch so the release-apk job below can be triggered
  # without cutting a tag (useful for verifying signing / R8 against an
  # arbitrary commit during release rehearsals).
  workflow_dispatch:

# Force-pushes to a PR cancel the in-flight run; pushes to main never cancel
# each other so every merge gets a fresh full run. Mirrors the desktop CI.
concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  build:
    name: Build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-android-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-android-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install AGP-compatible NDK + cmake
        run: |
          # The version-selection logic lives in
          # android/core/build.gradle.kts: it globs $ANDROID_HOME/ndk/
          # and picks the highest-installed AGP-supported NDK, falling
          # back to a hard-coded version when nothing compatible is
          # installed. The runner image preinstalls a too-new preview
          # NDK (currently r29) which the glob filters out, and the
          # gradle fallback hits the same hard-coded value as below.
          #
          # CI's job is just to make sure that version is on disk before
          # gradle runs — installing it via sdkmanager is the only way
          # to guarantee that, since the runner image doesn't ship it.
          # Bump this in lockstep with the gradle-side fallback when
          # bumping AGP.
          NDK_VERSION="27.2.12479018"
          sdkmanager --install "ndk;$NDK_VERSION" "cmake;3.22.1" >/dev/null
          ndk_dir="$ANDROID_HOME/ndk/$NDK_VERSION"
          if [ ! -d "$ndk_dir" ]; then
            echo "::error::NDK install failed: $ndk_dir not present after sdkmanager"
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ndk_dir" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_dir" >> "$GITHUB_ENV"
          echo "Resolved NDK: $ndk_dir"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Cargo build (Android-relevant crates)
        run: cargo build -p mdviewer-core -p mdviewer-jni --features uniffi --release

      # A1 contract: the 10 e2e specs must remain on disk so RED→GREEN can
      # be tracked. If someone deletes one to "fix" CI, fail loudly here.
      - name: Verify e2e spec files exist (A1 guard)
        run: |
          count="$(ls android/app/src/androidTest/kotlin/dev/mdviewer/e2e/*.kt | wc -l)"
          if [ "$count" != "10" ]; then
            echo "::error::Expected 10 e2e spec files under android/app/src/androidTest/kotlin/dev/mdviewer/e2e/, found $count"
            exit 1
          fi

      - name: Gradle assemble (:core + :app)
        working-directory: android
        run: ./gradlew :core:assembleDebug :app:assembleDebug --stacktrace

      - name: Gradle unit tests (:core + :app)
        working-directory: android
        run: ./gradlew :core:testDebugUnitTest :app:testDebugUnitTest --stacktrace

      - name: Gradle JaCoCo coverage report
        working-directory: android
        run: ./gradlew :app:testDebugUnitTestCoverage --stacktrace

      - name: Coverage gate (saf, data, render, ui >= 80%)
        working-directory: android
        run: |
          ../scripts/check-coverage.sh \
            app/build/reports/jacoco/testDebugUnitTestCoverage.xml \
            80 saf data render ui

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html
          path: android/app/build/reports/jacoco/testDebugUnitTestCoverage/

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  emulator:
    name: Instrumented tests (API 33, x86_64)
    runs-on: ubuntu-latest
    needs: build
    # The e2e suite from A1 stays RED until E7's final green gate. Mark this
    # job as continue-on-error so the workflow stays neutral while Phase C/D
    # PRs land. Flip this to `false` (and remove this comment) in E7.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-android-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-android-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install AGP-compatible NDK + cmake
        run: |
          # The version-selection logic lives in
          # android/core/build.gradle.kts: it globs $ANDROID_HOME/ndk/
          # and picks the highest-installed AGP-supported NDK, falling
          # back to a hard-coded version when nothing compatible is
          # installed. The runner image preinstalls a too-new preview
          # NDK (currently r29) which the glob filters out, and the
          # gradle fallback hits the same hard-coded value as below.
          #
          # CI's job is just to make sure that version is on disk before
          # gradle runs — installing it via sdkmanager is the only way
          # to guarantee that, since the runner image doesn't ship it.
          # Bump this in lockstep with the gradle-side fallback when
          # bumping AGP.
          NDK_VERSION="27.2.12479018"
          sdkmanager --install "ndk;$NDK_VERSION" "cmake;3.22.1" >/dev/null
          ndk_dir="$ANDROID_HOME/ndk/$NDK_VERSION"
          if [ ! -d "$ndk_dir" ]; then
            echo "::error::NDK install failed: $ndk_dir not present after sdkmanager"
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ndk_dir" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_dir" >> "$GITHUB_ENV"
          echo "Resolved NDK: $ndk_dir"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # The action requires KVM access to run hardware-accelerated x86_64
      # AVDs on the Linux runner. This udev rule grants the runner user
      # rw access to /dev/kvm.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Spec mandates `reactivecircus/android-emulator-runner@v2`. A floating
      # major-version tag is the contract the spec specifies; revisit pinning
      # to a commit SHA in a follow-up once a concrete SHA can be verified
      # against the upstream release.
      - name: Run :app:connectedDebugAndroidTest on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_4
          script: cd android && ./gradlew :app:connectedDebugAndroidTest --stacktrace

      - name: Upload connected test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: connected-test-reports
          path: |
            android/app/build/reports/androidTests/
            android/app/build/outputs/androidTest-results/

  # E4: assembles a signed release APK for tag pushes / manual dispatch.
  # The release keystore is read from CI secrets (base64-encoded) — see
  # `android/keystore/README.md` for the env-var contract. The job is
  # gated on `github.ref_type == 'tag' || workflow_dispatch` so push /
  # PR runs don't burn cycles on the release path; release-cut wiring
  # (uploading to Play / GitHub Releases) is a follow-up.
  release-apk:
    name: Release APK (signed)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          # versionName resolves via `git describe --tags --abbrev=0`.
          # The default checkout fetches a single commit with no tags, so
          # the describe call would emit empty and the build would fall
          # back to "0.0.0-dev". Fetching tags keeps the version honest.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache cargo registry + git + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-android-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-android-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install AGP-compatible NDK + cmake
        run: |
          # The version-selection logic lives in
          # android/core/build.gradle.kts: it globs $ANDROID_HOME/ndk/
          # and picks the highest-installed AGP-supported NDK, falling
          # back to a hard-coded version when nothing compatible is
          # installed. The runner image preinstalls a too-new preview
          # NDK (currently r29) which the glob filters out, and the
          # gradle fallback hits the same hard-coded value as below.
          #
          # CI's job is just to make sure that version is on disk before
          # gradle runs — installing it via sdkmanager is the only way
          # to guarantee that, since the runner image doesn't ship it.
          # Bump this in lockstep with the gradle-side fallback when
          # bumping AGP.
          NDK_VERSION="27.2.12479018"
          sdkmanager --install "ndk;$NDK_VERSION" "cmake;3.22.1" >/dev/null
          ndk_dir="$ANDROID_HOME/ndk/$NDK_VERSION"
          if [ ! -d "$ndk_dir" ]; then
            echo "::error::NDK install failed: $ndk_dir not present after sdkmanager"
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ndk_dir" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_dir" >> "$GITHUB_ENV"
          echo "Resolved NDK: $ndk_dir"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Assemble release APK
        working-directory: android
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: ./gradlew :app:assembleRelease :app:lintRelease --stacktrace

      - name: Verify tmp keystore was cleaned up
        working-directory: android
        run: |
          if [ -f app/build/release-keystore.jks ]; then
            echo "::error::Release keystore tmp file leaked into workspace"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mdviewer-android-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
